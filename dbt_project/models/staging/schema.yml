version: 2

models:
  - name: stg_orders
    description: "Cleaned and validated orders data"
    columns:
      - name: order_id
        description: "Unique order identifier"
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: order_total
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['paid', 'pending', 'cancelled', 'refunded']
      - name: order_date
        data_tests:
          - not_null

  - name: stg_users
    description: "Cleaned and validated users data"
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: email
        data_tests:
          - unique
          - not_null
      - name: country_code
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['LK', 'US', 'UK', 'IN', 'AU', 'DE']
      - name: joined_date
        data_tests:
          - not_null

  - name: stg_products
    description: "Cleaned and validated products data"
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: product_name
        data_tests:
          - not_null
      - name: price
        data_tests:
          - not_null
      - name: category
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Electronics', 'Clothing', 'Books', 'Home', 'Sports']
